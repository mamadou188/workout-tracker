<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Restore Workout Data</title>
<style>
  body{background:#080808;color:#f0f0f0;font-family:monospace;padding:40px 20px;text-align:center;}
  h2{color:#c8f135;letter-spacing:3px;margin-bottom:10px;}
  p{color:#888;font-size:13px;line-height:1.6;margin-bottom:20px;}
  button{background:#c8f135;color:#080808;border:none;padding:16px 32px;font-size:16px;font-weight:bold;border-radius:4px;cursor:pointer;width:100%;margin-bottom:12px;}
  .open{background:#222;color:#c8f135;border:1px solid rgba(200,241,53,.4);}
  .success{color:#c8f135;font-size:15px;display:none;margin-top:20px;line-height:2;}
</style>
</head>
<body>
<h2>RESTORE WORKOUT DATA</h2>
<p>Tap the button below to restore all your workout history.<br>Must be opened on <strong>mamadou188.github.io</strong></p>
<button onclick="doRestore()">RESTORE MY DATA</button>
<button class="open" onclick="window.location='/workout-tracker/'">OPEN WORKOUT APP</button>
<div class="success" id="msg">✓ Restored successfully!<br>Tap "Open Workout App" above.</div>
<script>
const BACKUP = PLACEHOLDER;

function doRestore(){
  try{
    localStorage.setItem('wt_program', JSON.stringify(BACKUP.program));
    for(const [k,v] of Object.entries(BACKUP.data)){
      localStorage.setItem(k, v);
    }
    document.getElementById('msg').style.display='block';
    document.querySelector('button').textContent='RESTORED!';
    document.querySelector('button').style.background='#444';
    document.querySelector('button').style.color='#c8f135';
  }catch(e){
    alert('Error: '+e.message);
  }
}
</script>
</body>
</html>
