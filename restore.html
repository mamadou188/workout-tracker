<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Restore Workout Data</title>
<style>
  body { background: #080808; color: #f0f0f0; font-family: monospace; padding: 30px 20px; text-align: center; }
  h2 { color: #c8f135; letter-spacing: 3px; }
  button { background: #c8f135; color: #080808; border: none; padding: 16px 32px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 20px; width: 100%; }
  p { color: #888; font-size: 13px; line-height: 1.6; }
  .success { color: #c8f135; font-size: 18px; display: none; margin-top: 20px; }
</style>
</head>
<body>
<h2>RESTORE WORKOUT DATA</h2>
<p>Tap the button below to restore all your workout history into the app.</p>
<button onclick="doRestore()">RESTORE MY DATA</button>
<div class="success" id="msg">✓ Done! You can now close this page and open your workout app.</div>
<script>
function doRestore() {
  const backup = BACKUP_DATA;
  
  try {
    // Restore program
    if (backup.program) {
      localStorage.setItem('wt_program', JSON.stringify(backup.program));
    }
    // Restore all data keys
    for (const [k, v] of Object.entries(backup.data)) {
      localStorage.setItem(k, v);
    }
    document.getElementById('msg').style.display = 'block';
    document.querySelector('button').textContent = '✓ RESTORED!';
    document.querySelector('button').style.background = '#444';
  } catch(e) {
    alert('Error: ' + e.message);
  }
}
</script>
</body>
</html>
